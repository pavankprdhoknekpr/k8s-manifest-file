apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-java17-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-java17-app
  template:
    metadata:
      labels:
        app: my-java17-app
    spec:
      containers:
        - name: my-java17-container
          image: my-java17-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: my-java17-app-service
spec:
  type: NodePort
  selector:
    app: my-java17-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30007